name: Atualização Diária de Dados

on:
  schedule:
    # 10:50 UTC = 07:50 BRT (horário de Brasília, UTC-3), dias úteis
    - cron: '50 10 * * 1-5'
  workflow_dispatch:
    inputs:
      motivo:
        description: 'Motivo da execução manual'
        required: false
        default: 'Execução manual solicitada'

jobs:
  atualizar-dados:
    name: Coletar e publicar dados
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Instalar dependências Python
        run: pip install -r requirements.txt

      - name: Executar script de coleta
        run: python coletar_dados.py
        env:
          PYTHONUNBUFFERED: '1'
          CEPEA_API_KEY: ${{ secrets.CEPEA_API_KEY }}

      - name: Analisar insights com Claude
        run: python analisar_insights.py
        env:
          PYTHONUNBUFFERED: '1'
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit e Push dos dados atualizados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dados_commodities.json
          git diff --staged --quiet || git commit -m "dados: atualização automática $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
